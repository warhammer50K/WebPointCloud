services:
  - type: web
    name: webpointcloud
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: WEB_PORT
        value: "10000"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: WPC_DATA_DIR
        value: /tmp/webpointcloud
      - key: WPC_PUBLIC
        value: "1"
      - key: WPC_MAX_UPLOAD_MB
        value: "50"
